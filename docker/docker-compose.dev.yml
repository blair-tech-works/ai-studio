# Dev-only: just PostgreSQL with persistent local storage
# Usage: docker compose -f docker/docker-compose.dev.yml up -d
# Data persists in ai-studio/data/pg/ (gitignored)

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-studio-db
    environment:
      POSTGRES_USER: ai_studio
      POSTGRES_PASSWORD: ai_studio
      POSTGRES_DB: ai_studio
    ports:
      - "5434:5432"
    volumes:
      - ../data/pg:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_studio"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
